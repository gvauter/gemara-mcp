title: Gemara MCP Server Security Threat Catalog

metadata:
  id: GEMARAPROJ.GEMARA.MCP
  type: ThreatCatalog
  gemara-version: "1.0.0-rc.0"
  version: 1.0.0
  description: >-
    The Gemara MCP Server exposes tools to help with Gemara artifact authoring.
    It provides read-only access to lexicon terms and schema documentation,
    YAML artifact validation against CUE schemas, and guided wizard prompts
    for creating Threat Catalogs and Control Catalogs (Layer 2).
  author:
    id: gemara
    name: Gemara Authors
    type: Software Assisted
  mapping-references:
    - id: CCC-Core
      title: FINOS Common Cloud Controls Core
      version: v2025.10
      url: https://github.com/finos/common-cloud-controls/releases/download/v2025.10/CCC.Core_v2025.10.yaml
      description: FINOS CCC core catalog of capabilities and threats for cloud controls
    - id: MITRE-ATTACK
      title: MITRE ATT&CK Enterprise
      version: "16.1"
      url: https://attack.mitre.org/techniques/enterprise/
      description: MITRE ATT&CK knowledge base of adversary tactics and techniques
    - id: GEMARAPROJ.GEMARA.MCP
      title: Gemara MCP Server Security Capability Catalog
      version: 1.0.0
      description: Capabilities extracted from Gemara MCP Server Security Threat Catalog

groups:
  - id: tampering
    title: Tampering
    description: Threats that modify, corrupt, or substitute data, schemas, cache, validation logic, or prompt behavior.
  - id: denial-of-service
    title: Denial of Service
    description: Threats that degrade or block availability of server capabilities through resource exhaustion, outages, or dependency failures.

threats:
  - id: GEMARAPROJ.GEMARA.MCP.THR01
    title: Lexicon unavailable or degraded
    description: Unavailability or high latency of lexicon retrieval (e.g. DoS, outage) could block or degrade artifact authoring workflows.
    group: denial-of-service
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP01
            remarks: Threat affects availability of lexicon retrieval.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1498
            remarks: Network Denial of Service
  - id: GEMARAPROJ.GEMARA.MCP.THR02
    title: Stale or wrong lexicon version
    description: Serving an outdated or wrong version of the lexicon could lead to inconsistent or non-compliant artifact authoring.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP01
            remarks: Threat affects integrity of data provided by this capability.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1565
            remarks: Data Manipulation
  - id: GEMARAPROJ.GEMARA.MCP.THR03
    title: Resource exhaustion via large YAML
    description: Excessively large or complex YAML inputs can exhaust CPU, memory, or time limits during parsing/validation, causing denial of service to the validation service.
    group: denial-of-service
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP02
            remarks: Exhaustion of validation service resources.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1499
            remarks: Endpoint Denial of Service
  - id: GEMARAPROJ.GEMARA.MCP.THR04
    title: Schema source unavailable
    description: Unavailability of the Gemara schema (network, registry, or dependency failure) prevents validation from running and blocks artifact authoring workflows.
    group: denial-of-service
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP02
            remarks: Unavailability of schema prevents this capability from functioning.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP03
            remarks: Same schema source used for documentation retrieval.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1498
            remarks: Network Denial of Service
  - id: GEMARAPROJ.GEMARA.MCP.THR05
    title: Schema cache poisoning
    description: Corrupted or malicious schema data in cache leads to incorrect validation outcomes (accepting invalid artifacts or rejecting valid ones), undermining trust in the validation capability.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP02
            remarks: Poisoned cache undermines integrity of validation results.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP03
            remarks: Same cache may serve documentation.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1565
            remarks: Data Manipulation
  - id: GEMARAPROJ.GEMARA.MCP.THR06
    title: Validation bypass or false acceptance
    description: Validation logic or schema is circumvented or misused so that invalid or non-compliant artifacts are accepted as valid (e.g. parser quirks, schema gaps, or misuse of the tool).
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP02
            remarks: Bypass or misuse directly affects validation correctness.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1565
            remarks: Data Manipulation
  - id: GEMARAPROJ.GEMARA.MCP.THR07
    title: Stale or wrong schema version
    description: Validation runs against an outdated or incorrect schema version, producing misleading pass/fail results and a false sense of compliance.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP02
            remarks: Wrong schema version leads to incorrect validation outcomes.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP03
            remarks: Same version used for documentation.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1195
            remarks: Supply Chain Compromise
  - id: GEMARAPROJ.GEMARA.MCP.THR08
    title: Prompt injection
    description: User or third-party content embedded in prompts or artifact drafts could cause the LLM to ignore wizard instructions, produce invalid or malicious artifacts, or leak sensitive data.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP04
            remarks: Injection targets this capability's prompts and wizard flow.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1204
            remarks: User Execution
  - id: GEMARAPROJ.GEMARA.MCP.THR09
    title: Guided prompts unavailable or degraded
    description: Unavailability or degradation of the prompt/wizard service could block or hinder artifact creation workflows.
    group: denial-of-service
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP04
            remarks: Unavailability directly affects this capability.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1498
            remarks: Network Denial of Service
  - id: GEMARAPROJ.GEMARA.MCP.THR10
    title: Upstream supply chain compromise
    description: An adversary compromises the upstream source (GitHub lexicon repository or CUE registry) to inject malicious schema or lexicon content before it reaches the in-process cache, affecting all consumers of those resources.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP05
            remarks: Compromise of upstream sources affects all resources fetched by this capability.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP01
            remarks: Malicious lexicon content served to consumers.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP03
            remarks: Malicious schema docs served to consumers.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1195
            remarks: Supply Chain Compromise
  - id: GEMARAPROJ.GEMARA.MCP.THR11
    title: Network interception of external fetches
    description: A man-in-the-middle attacker intercepts HTTP requests to lexicon or schema endpoints, substituting tampered content that is then cached and served to users.
    group: tampering
    capabilities:
      - reference-id: GEMARAPROJ.GEMARA.MCP
        entries:
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP05
            remarks: Network interception targets the HTTP fetch layer.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP01
            remarks: Tampered lexicon content served to consumers.
          - reference-id: GEMARAPROJ.GEMARA.MCP.CAP03
            remarks: Tampered schema docs served to consumers.
    vectors:
      - reference-id: MITRE-ATTACK
        entries:
          - reference-id: T1557
            remarks: Adversary-in-the-Middle
